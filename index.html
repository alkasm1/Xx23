<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALM Book</title>

  <script src="jszip.min.js"></script>
  <script src="pdf.min.js"></script>
  <script src="pdf.worker.min.js"></script>
  <script src="jspdf.umd.min.js"></script>
  <script src="docx.min.js"></script>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0BA37F">

  <style>
    body{font-family:Cairo,system-ui;background:#f6f8fb;margin:0}
    header{background:#0BA37F;color:#fff;text-align:center;padding:15px}
    .container{padding:20px;max-width:900px;margin:auto}
    .card{background:#fff;padding:15px;border-radius:12px;margin-top:10px}
    button{width:100%;padding:12px;margin-top:10px;background:#0BA37F;color:#fff;border:0;border-radius:10px}
    canvas{width:100%;margin-top:10px;border:1px solid #ddd}
    #outputText{white-space:pre-wrap;margin-top:10px}
  </style>
</head>

<body>

<header>
  <h2>ALM Book</h2>
</header>

<div class="container">

  <div class="card">
    <input type="file" id="docInput" accept=".docx,.pdf">
    <input type="file" id="imageInput" accept="image/png">

    <input id="userKey" value="123">

    <button id="btnEncode">تحويل إلى صورة</button>
    <button id="btnDecode">استرجاع من صورة</button>

    <canvas id="canvas"></canvas>
    <div id="outputText"></div>
  </div>

</div>

<!-- ترتيب مهم جداً -->
<script src="alm_vm.js"></script>
<script src="alm_interpreter.js"></script>
<script src="alm_programs.js"></script>
<script src="script.js"></script>

<script>
if(window.pdfjsLib){
  pdfjsLib.GlobalWorkerOptions.workerSrc="pdf.worker.min.js";
}
</script>

</body>
</html>
